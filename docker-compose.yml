services:
  postgres:
    image: postgres:16
    container_name: mandate-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mandate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mandate}
      POSTGRES_DB: ${POSTGRES_DB:-mandate}
    ports:
      # 5433 on the host, not 5432: a locally-installed PostgreSQL commonly
      # already holds 5432, and it silently shadows this container — connections
      # reach the wrong database and fail to authenticate. Override with
      # POSTGRES_PORT if 5433 is taken too.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - mandate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mandate}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mandate-postgres-data:
