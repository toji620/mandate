version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: mandate-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mandate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mandate}
      POSTGRES_DB: ${POSTGRES_DB:-mandate}
    ports:
      - "5432:5432"
    volumes:
      - mandate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mandate}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mandate-postgres-data:
